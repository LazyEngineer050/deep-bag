<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="6" fill="#0d0d14"/>
  <!-- bag body -->
  <ellipse cx="16" cy="22" rx="13" ry="10" fill="#1a1a2e" stroke="#f97316" stroke-width="1.2"/>
  <!-- bag neck -->
  <rect x="12.5" y="10" width="7" height="7" rx="2" fill="#1a1a2e" stroke="#f97316" stroke-width="1.2"/>
  <!-- knot -->
  <ellipse cx="16" cy="10" rx="5.5" ry="3" fill="#f97316"/>
  <!-- dollar sign -->
  <text x="16" y="27" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#f97316">$</text>
</svg>
